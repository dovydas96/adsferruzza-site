  <script defer>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        if (!window.firebase?.apps?.length) return;
        const db = firebase.firestore();
        const doc = await db.collection('site').doc('menu').get();
        if (!doc.exists) return;
        const url = doc.data()?.url;
        if (!url) return;
        const a = document.getElementById('menuDownload');
        const obj = document.getElementById('menuEmbed');
        if (a) a.href = url;
        if (obj) obj.data = url + '#view=FitH';
      } catch (_) { /* fall back to static /menu/menu.pdf */ }
    });
  </script>
