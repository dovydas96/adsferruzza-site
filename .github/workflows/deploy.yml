name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'IMPROVEMENTS.md'
      - '.gitignore'
      - 'scripts/README-HOURS.md'
  workflow_dispatch: {}

# Prevent concurrent deploys racing each other
concurrency:
  group: firebase-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project adsferruzza --non-interactive --token "$FIREBASE_TOKEN"
