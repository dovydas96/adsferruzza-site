name: Update Google Reviews

on:
  schedule:
    - cron: '15 2 * * *'  # Daily at 02:15 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch reviews (Place ID preferred, fallback to Maps URL)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
          GOOGLE_MAPS_URL: ${{ secrets.GOOGLE_MAPS_URL }}
          REVIEWS_MAX: '6'
          LANGUAGE: it
        run: |
          if [[ -n "$GOOGLE_PLACES_API_KEY" && -n "$GOOGLE_PLACE_ID" ]]; then
            node scripts/fetch-google-reviews.mjs
          elif [[ -n "$GOOGLE_PLACES_API_KEY" && -n "$GOOGLE_MAPS_URL" ]]; then
            node scripts/fetch-from-maps-url.mjs
          else
            echo "[reviews] Skipping: required secrets missing"
          fi

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/reviews.json
            git commit -m "chore(reviews): update Google reviews [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
